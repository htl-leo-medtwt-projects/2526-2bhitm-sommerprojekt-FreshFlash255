<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineMasters</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/mainScript.js" defer></script>
    <script src="scripts/togglePages.js" defer></script>
</head>
<body>
    <section class="startScreen" id="startScreen">
        <div class="fullscreenButton" id="fullscreenButton" onclick="toggleFullscreen()"><img src="img/fullscreenButton.png"></div>
        <img class="gameLogo" id="gameLogo" src="img/logo/logo2.png">
        <div class="startMenuButton" id="startButton" onclick="onStartButtonClick()"><img src="img/PlayButton.png"></div>
        <div class="startMenuButton" id="settingsButton" onclick="onSettingsButtonClick()"><img src="img/SettingsButton.png"></div>
        <div class="startMenuButton" id="tutorialButton" onclick="onTutorialButtonClick()"><img src="img/TutorialButton.png"></div>
    </section>
    <section class="settingsScreen" id="settingsScreen">
        <div class="contentWrapper" id="contentWrapperSettings"><img src="img/menuBg.png"></div>
    </section>
    <section class="tutorialScreen" id="tutorialScreen">
        <div class="contentWrapper" id="contentWrapperSettings"><img src="img/menuBg.png"></div>
    </section>
    <section class="gameScreen" id="gameScreen"></section>
    <section class="inventoryScreen" id="inventoryScreen"></section>
    <section class="pcScreen" id="pcScreen">
        <section class="pcHomeScreen" id="pcHomeScreen"></section>
        <section class="pcSellScreen" id="pcSellScreen"></section>
        <section class="pcShopScreen" id="pcShopScreen"></section>
        <section class="pcEnergyScreen" id="pcEnergyScreen"></section>
    </section>
</body>
</html>
